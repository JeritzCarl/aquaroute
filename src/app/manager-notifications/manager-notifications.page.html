<ion-header class="aqua-header">
  <ion-toolbar class="aqua-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/manager" text="" icon="arrow-back-outline"></ion-back-button>
    </ion-buttons>

    <ion-title class="aqua-title">Manager Notifications</ion-title>

    <ion-buttons slot="end" class="toolbar-actions">
      <div class="notif-wrapper">
        <ion-button fill="clear" (click)="markAllAsRead()" title="Mark all as read">
          <ion-icon name="checkmark-done-outline"></ion-icon>
          <!-- 🔴 Live badge showing unread count -->
          <ion-badge *ngIf="unreadCount > 0" color="danger" class="notif-badge">
            {{ unreadCount }}
          </ion-badge>
        </ion-button>
      </div>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="notifications-content ion-padding">
  <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <!-- 🔹 Loading State -->
  <div *ngIf="loading" class="loading-state">
    <ion-spinner></ion-spinner>
  </div>

  <!-- 🔹 Notification List -->
  <ion-list *ngIf="!loading && notifications.length">
    <ion-item
      lines="none"
      *ngFor="let n of notifications"
      [class.unread]="!n.read"
    >
      <ion-icon [name]="getIcon(n.type)" slot="start" class="notif-icon"></ion-icon>

      <ion-label (click)="openRelated(n)">
        <h2 class="title">
          {{ n.message }}
          <ion-chip *ngIf="!n.read" color="primary" class="chip-unread">NEW</ion-chip>
        </h2>
        <p class="meta">{{ n.createdAt?.toDate() | date: 'short' }}</p>
      </ion-label>

      <!-- 🔹 Delete Notification -->
      <ion-button fill="clear" color="medium" slot="end" (click)="deleteNotification(n)">
        <ion-icon name="trash-outline"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

  <!-- 🔹 Empty State -->
  <div *ngIf="!loading && !notifications.length" class="empty-state">
    <ion-icon name="notifications-off-outline" class="empty-icon"></ion-icon>
    <h2>No Notifications</h2>
    <p>New orders and messages will appear here.</p>
  </div>
</ion-content>
