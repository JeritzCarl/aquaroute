<ion-content [fullscreen]="true" class="reset-password-bg">
  <!-- Back Button -->
  <ion-buttons>
    <ion-back-button type="button" icon="chevron-back" defaultHref="/login"></ion-back-button>
  </ion-buttons>

  <div class="form-container">
    <img src="assets/AquaRoute Word Logo.png" alt="AquaRoute Logo" class="logo" />

    <h1 class="title">Reset Password</h1>
    <p class="subtitle">Enter your email and we’ll send you a reset link</p>

    <!-- Reset Form -->
    <form (ngSubmit)="resetPassword()" autocomplete="off" novalidate>
      <ion-item class="input-item">
        <ion-label position="stacked">Email</ion-label>
        <ion-input
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          placeholder="you@example.com"
        ></ion-input>
      </ion-item>

      <ion-button
        expand="block"
        class="reset-btn"
        type="submit"
        [disabled]="!email || isLoading"
      >
        <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        <span *ngIf="!isLoading">Send Reset Link</span>
      </ion-button>
    </form>

    <!-- Back to login -->
    <p class="back-link">
      Remember your password? <a [routerLink]="['/login']">Log In</a>
    </p>
  </div>
</ion-content>
