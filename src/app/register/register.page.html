<ion-content [fullscreen]="true" class="register-bg" scroll-y="true">
  <!-- Floating Back Button -->
  <ion-buttons class="back-btn">
    <ion-back-button defaultHref="/auth-options"></ion-back-button>
  </ion-buttons>

  <div class="register-wrapper">
    <!-- Header Section -->
    <div class="header-section">
      <img src="assets/AquaRoute Word Logo.png" alt="AquaRoute Logo" class="logo" />
      <p class="tagline">Deliver Smarter. Hydrate Faster.</p>
    </div>

    <!-- Form Card -->
    <div class="register-card">
      <h1 class="title">Create your Account</h1>
      <p class="subtitle">Join AquaRoute today</p>

      <form (ngSubmit)="createAccount()" autocomplete="off" novalidate>
        <ion-item class="input-item">
          <ion-input
            type="text"
            [(ngModel)]="fullName"
            name="fullName"
            placeholder="Full Name"
            required
          ></ion-input>
        </ion-item>

        <ion-item class="input-item">
          <ion-input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="Email"
            required
          ></ion-input>
        </ion-item>

        <ion-item class="input-item password-item">
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="Password"
            required
            (ionInput)="checkPasswordStrength()"
          ></ion-input>
          <ion-icon
            [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
            class="toggle-icon"
            slot="end"
            (click)="togglePassword()"
          ></ion-icon>
        </ion-item>

        <!-- Password Strength Bar -->
        <div class="strength-bar" [ngClass]="passwordStrength"></div>


        <ion-item class="input-item password-item">
          <ion-input
            [type]="showConfirm ? 'text' : 'password'"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="Confirm Password"
            required
          ></ion-input>
          <ion-icon
            [name]="showConfirm ? 'eye-off-outline' : 'eye-outline'"
            class="toggle-icon"
            slot="end"
            (click)="toggleConfirm()"
          ></ion-icon>
        </ion-item>

        <ion-button expand="block" class="signup-btn" type="submit">
          Create Account
        </ion-button>

        <p *ngIf="nameError" class="error-msg">{{ nameError }}</p>
        <p *ngIf="passwordError" class="error-msg">{{ passwordError }}</p>
      </form>

      <p class="login-link">
        Already have an account? <a (click)="goToLogin()">Log In</a>
      </p>
    </div>
  </div>
</ion-content>
